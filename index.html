<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lacto-Calc | Inovasi Pakan Sapi Perah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animation-fade-in {
      animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    html { scroll-behavior: smooth; }
    
    /* Aturan khusus saat mencetak ke PDF */
    @media print {
      body { background-color: white !important; }
      nav, header, .form-section, #cta-section, footer, .no-print, #mobileMenu { 
        display: none !important; 
      }
      main { margin: 0 !important; padding: 0 !important; }
      #results-section { 
        width: 100% !important; 
        display: block !important; 
      }
      .bg-white { 
        box-shadow: none !important; 
        border: 2px solid #e5e7eb !important; 
        page-break-inside: avoid;
      }
      .print-header { display: flex !important; }
    }
  </style>
</head>
<body class="min-h-screen bg-stone-50 font-sans text-gray-800 selection:bg-emerald-200 flex flex-col">

  <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-emerald-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-2 group cursor-pointer" onclick="switchView('calculator')">
          <div class="bg-gradient-to-br from-emerald-500 to-emerald-700 p-2 rounded-xl shadow-sm group-hover:rotate-12 transition-transform">
            <i data-lucide="leaf" class="w-6 h-6 text-white"></i>
          </div>
          <span class="font-black text-2xl tracking-tight text-emerald-900">Lacto<span class="text-amber-500">-Calc</span></span>
        </div>
        
        <div class="hidden md:flex space-x-6 items-center">
          <button onclick="switchView('calculator')" id="nav-calculator" class="nav-btn text-emerald-700 font-bold border-b-2 border-emerald-600 pb-1" data-i18n="navCalc">Kalkulator</button>
          <button onclick="switchView('research')" id="nav-research" class="nav-btn text-gray-500 hover:text-emerald-600 font-medium transition-colors pb-1 border-b-2 border-transparent" data-i18n="navRes">Riset Kelor & Katuk</button>
          <button onclick="switchView('about')" id="nav-about" class="nav-btn text-gray-500 hover:text-emerald-600 font-medium transition-colors pb-1 border-b-2 border-transparent" data-i18n="navAbout">Tentang Kami</button>
        </div>
        
        <div class="flex items-center gap-3">
          <div class="relative flex items-center bg-gray-50 border border-gray-200 rounded-lg px-2 py-1">
            <i data-lucide="globe" class="w-4 h-4 text-gray-500 mr-1"></i>
            <select id="langSelect" onchange="changeLanguage(this.value)" class="bg-transparent text-sm font-bold text-gray-700 outline-none cursor-pointer appearance-none pr-4">
              <option value="id">Indonesia</option>
              <option value="jv">Jawa</option>
              <option value="md">Madura</option>
            </select>
          </div>

          <button onclick="switchView('shop')" class="hidden sm:flex bg-amber-500 hover:bg-amber-600 text-white px-5 py-2 rounded-full font-bold transition-colors shadow-md shadow-amber-500/20 items-center gap-2 transform hover:-translate-y-0.5">
            <i data-lucide="shopping-cart" class="w-4 h-4"></i> <span data-i18n="navShop">Beli Produk</span>
          </button>
          
          <button onclick="toggleMobileMenu()" class="md:hidden text-gray-500 hover:text-emerald-600 focus:outline-none p-2">
            <i data-lucide="menu" class="w-6 h-6"></i>
          </button>
        </div>
      </div>
    </div>

    <div id="mobileMenu" class="hidden md:hidden bg-white border-t border-emerald-100 shadow-xl absolute w-full z-40">
      <div class="flex flex-col px-4 pt-2 pb-4 space-y-1">
        <button onclick="switchView('calculator')" class="text-left px-4 py-3 rounded-xl font-bold text-emerald-700 bg-emerald-50" data-i18n="navCalc">Kalkulator</button>
        <button onclick="switchView('research')" class="text-left px-4 py-3 rounded-xl font-medium text-gray-600 hover:bg-gray-50" data-i18n="navRes">Riset Kelor & Katuk</button>
        <button onclick="switchView('about')" class="text-left px-4 py-3 rounded-xl font-medium text-gray-600 hover:bg-gray-50" data-i18n="navAbout">Tentang Kami</button>
        <button onclick="switchView('shop')" class="text-left px-4 py-3 rounded-xl font-bold text-amber-600 hover:bg-amber-50 flex items-center gap-2">
          <i data-lucide="store" class="w-5 h-5"></i> <span data-i18n="navShopMobile">Shop (Pesan Sekarang)</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="flex-grow">
    
    <div id="view-calculator" class="animation-fade-in block">
      <header class="relative bg-emerald-900 overflow-hidden text-white py-20 px-4">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
          <div class="absolute -top-24 -left-24 w-96 h-96 bg-emerald-500 rounded-full blur-3xl"></div>
          <div class="absolute top-1/2 -right-24 w-96 h-96 bg-amber-500 rounded-full blur-3xl"></div>
        </div>
        <div class="max-w-4xl mx-auto text-center relative z-10">
          <div class="inline-flex items-center gap-2 bg-emerald-800/60 border border-emerald-600/50 text-emerald-100 px-5 py-2 rounded-full text-sm font-bold mb-6 backdrop-blur-sm shadow-lg">
            <i data-lucide="sparkles" class="w-4 h-4 text-amber-400"></i> <span data-i18n="heroBadge">Kekuatan Daun Kelor & Katuk 100% Organik</span>
          </div>
          <h1 class="text-5xl md:text-6xl font-black mb-6 leading-tight tracking-tight">
            <span data-i18n="heroTitle1">Hitung Tepat,</span> <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-400" data-i18n="heroTitle2">Susu Melimpah!</span>
          </h1>
          <p class="text-lg md:text-xl text-emerald-100/90 max-w-2xl mx-auto mb-8 font-medium" data-i18n="heroSub">
            AI Kalkulator gizi pertama untuk sapi perah. Hemat konsentrat dan temukan takaran ASI Booster Lacto-Block yang presisi.
          </p>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12 -mt-16 relative z-20">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
          
          <div class="lg:col-span-5 form-section">
            <div class="bg-white rounded-3xl shadow-xl shadow-emerald-900/5 p-6 md:p-8 border border-emerald-50">
              <div class="flex items-center gap-4 mb-8 pb-6 border-b border-gray-100">
                <div class="bg-emerald-50 p-3 rounded-2xl">
                  <i data-lucide="calculator" class="w-7 h-7 text-emerald-600"></i>
                </div>
                <div>
                  <h2 class="text-2xl font-black text-gray-800" data-i18n="formTitle">Profil Ternak</h2>
                  <p class="text-sm text-gray-500 font-medium mt-1" data-i18n="formSub">Masukkan data sapi untuk analisa gizi</p>
                </div>
              </div>

              <form id="calcForm" class="space-y-7">
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="labelName">Nama / ID Sapi</label>
                  <input type="text" id="cowName" placeholder="Sapi Moli" required class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:ring-0 focus:border-emerald-500 transition-all outline-none bg-gray-50/50 font-medium placeholder-gray-400" />
                </div>
                <div>
                  <div class="flex justify-between mb-3">
                    <label class="block text-sm font-bold text-gray-700 flex items-center gap-2">
                      <i data-lucide="scale" class="w-5 h-5 text-emerald-600"></i> <span data-i18n="labelWeight">Berat Badan</span>
                    </label>
                    <span class="font-black text-emerald-700 bg-emerald-100 px-3 py-1 rounded-lg text-sm shadow-sm" id="weightDisplay">400 Kg</span>
                  </div>
                  <input type="range" id="weight" min="200" max="800" step="10" value="400" class="w-full h-3 bg-gray-200 rounded-full appearance-none cursor-pointer accent-emerald-600" oninput="updateWeightDisplay(this.value)" />
                  <div class="flex justify-between text-xs font-bold text-gray-400 mt-2 px-1">
                    <span>200 Kg</span>
                    <span>800 Kg</span>
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                    <i data-lucide="droplets" class="w-5 h-5 text-emerald-600"></i> <span data-i18n="labelMilk">Target Produksi (Liter/Hari)</span>
                  </label>
                  <input type="number" id="milk" min="0" max="50" value="12" required class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:ring-0 focus:border-emerald-500 transition-all outline-none bg-gray-50/50 font-medium text-lg" />
                </div>
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                    <i data-lucide="calendar" class="w-5 h-5 text-emerald-600"></i> <span data-i18n="labelPhase">Fase Laktasi</span>
                  </label>
                  <select id="phase" class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:ring-0 focus:border-emerald-500 transition-all outline-none bg-gray-50/50 font-bold text-gray-700 cursor-pointer">
                    <option value="awal">Awal (1 - 100 Hari)</option>
                    <option value="tengah">Tengah (101 - 200 Hari)</option>
                    <option value="akhir">Akhir (> 200 Hari)</option>
                    <option value="kering">Kering Kandang</option>
                  </select>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 text-white font-black py-4 px-6 rounded-2xl shadow-xl transition-all flex justify-center items-center gap-3">
                  <span data-i18n="btnCalc">Hitung Resep Pakan</span> <i data-lucide="arrow-right" class="w-6 h-6"></i>
